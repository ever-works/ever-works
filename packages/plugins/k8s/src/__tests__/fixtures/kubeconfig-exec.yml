apiVersion: v1
kind: Config
current-context: eks-prod
clusters:
  - name: eks-prod
    cluster:
      server: https://EXAMPLE.gr7.us-east-1.eks.amazonaws.com
contexts:
  - name: eks-prod
    context:
      cluster: eks-prod
      user: eks-user
users:
  - name: eks-user
    user:
      exec:
        command: aws-iam-authenticator
        args:
          - token
          - -i
          - prod
