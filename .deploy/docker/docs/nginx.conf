server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Standard text-asset compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Long cache for hashed/static assets emitted by Docusaurus
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # No cache for HTML so deploys ship instantly
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Serve clean URLs (Docusaurus emits both /foo/ and /foo/index.html)
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Custom 404 page from Docusaurus
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
