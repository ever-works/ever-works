---
kind: Service
apiVersion: v1
metadata:
  name: ever-works-mcp
spec:
  selector:
    app: ever-works-mcp
  ports:
    - name: web
      protocol: TCP
      port: 3200
      targetPort: 3200

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ever-works-mcp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ever-works-mcp
  template:
    metadata:
      labels:
        app: ever-works-mcp
    spec:
      # H-20: pod-level hardening. Same shape as the API manifest — pod
      # runs as non-root with seccomp/RuntimeDefault, container drops all
      # caps and disables privilege escalation. `readOnlyRootFilesystem`
      # stays false (the image writes to a few paths; flipping it on is
      # a follow-up that needs an emptyDir volume).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: ever-works-mcp
          image: registry.digitalocean.com/ever/ever-works-mcp:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: EVER_WORKS_API_URL
              value: "http://ever-works-api:3100"
            - name: EVER_WORKS_API_KEY
              value: "$EVER_WORKS_MCP_API_KEY"
            - name: EVER_WORKS_MCP_PORT
              value: "3200"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          ports:
            - containerPort: 3200
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ever-works-mcp-ing
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: mcp.ever.works
      http:
        paths:
          - backend:
              service:
                name: ever-works-mcp
                port:
                  number: 3200
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - mcp.ever.works
      secretName: mcp.ever.works-tls
