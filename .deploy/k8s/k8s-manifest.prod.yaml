---
# EW-616: Platform-managed kubeconfigs for k8s deploys to shared clusters.
# Stored as base64 in GH Actions secrets; Kubernetes decodes Secret.data
# values automatically when mounting via `secretKeyRef`, so the container
# receives the raw kubeconfig YAML in the env var.
apiVersion: v1
kind: Secret
metadata:
  name: ever-works-platform-kubeconfigs
type: Opaque
data:
  EVER_WORKS_K8S_WORKS_KUBECONFIG: "$EVER_WORKS_K8S_WORKS_KUBECONFIG_B64"
  EVER_WORKS_K8S_GAUZY_KUBECONFIG: "$EVER_WORKS_K8S_GAUZY_KUBECONFIG_B64"

---
kind: Service
apiVersion: v1
metadata:
  name: ever-works-web
spec:
  selector:
    app: ever-works-web
  ports:
    - name: web
      protocol: TCP
      port: 3000
      targetPort: 3000

---
kind: Service
apiVersion: v1
metadata:
  name: ever-works-api
spec:
  selector:
    app: ever-works-api
  ports:
    - name: web
      protocol: TCP
      port: 3100
      targetPort: 3100

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ever-works-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ever-works-api
  template:
    metadata:
      labels:
        app: ever-works-api
    spec:
      # H-20: pod-level hardening. The API container uses external
      # kubeconfigs (`EVER_WORKS_K8S_*_KUBECONFIG`) to deploy other Works,
      # so the in-cluster service-account token is unused and can be
      # safely disabled. runAsNonRoot + dropped capabilities mirror the
      # Docker image's `USER node` so a container compromise can't
      # escalate to root or capability-protected operations.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      # Spread the 2 prod replicas across nodes: each api pod can use ~6 GiB,
      # so stacking both on one node risks a single node's memory pressure
      # evicting both at once. Soft (preferred) so a single-node hiccup never
      # blocks scheduling entirely.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ever-works-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ever-works-api
          image: registry.digitalocean.com/ever/ever-works-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: WEB_URL
              value: https://app.ever.works
            - name: API_URL
              value: https://api.ever.works
            - name: ALLOWED_ORIGINS
              value: https://app.ever.works,https://api.ever.works
            - name: AUTH_SECRET
              value: "$AUTH_SECRET"
            - name: JWT_SECRET
              value: "$JWT_SECRET"
            # V8 heap cap right-sized to 2 GiB (was 6 GiB / #1169). Measured
            # footprint of the compiled API after #1156 lazy plugin loading +
            # the #1190 lazy-proxy materialize fix: ~370 MiB at boot, ~0.4-1.2
            # GiB under chat/normal load, ~540 MiB with every plugin eagerly
            # imported. Verified: clean boot, no V8-OOM under a 2 GiB cap.
            #
            # Keep `--max-old-space-size` ~= 2/3 of `resources.limits.memory`
            # (3Gi below) so V8 GCs before the container OOM-kills, and keep
            # `resources.requests.memory` (2Gi) close to real steady-state so
            # the scheduler reserves accurately without over-packing nodes.
            # History: #1145/#1169 raised heap+request to 6 GiB during the
            # 2026-05-30 "OOM" — which was actually the lazy-proxy chat
            # regression (fixed in #1190), not a true leak. Lasting plugin
            # footprint work: EW-693.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"

            # Trigger.dev
            - name: TRIGGER_ENABLED
              value: "$TRIGGER_ENABLED"
            - name: TRIGGER_SECRET_KEY
              value: "$TRIGGER_SECRET_KEY"
            - name: TRIGGER_API_URL
              value: "https://api.trigger.dev"
            - name: TRIGGER_INTERNAL_SECRET
              value: "$TRIGGER_INTERNAL_SECRET"
            - name: TRIGGER_MACHINE
              value: "$TRIGGER_MACHINE"

            # PostHog (analytics + feature flags) + Sentry (errors + traces).
            # See knowledge/infrastructure/EVER_WORKS_POSTHOG.md.
            # SDKs are graceful no-ops when the env var is unset.
            - name: SENTRY_DSN
              value: "$SENTRY_DSN"
            - name: SENTRY_ENVIRONMENT
              value: "$SENTRY_ENVIRONMENT"
            - name: POSTHOG_API_KEY
              value: "$POSTHOG_API_KEY"
            - name: POSTHOG_HOST
              value: "$POSTHOG_HOST"

            # GitHub Auth
            - name: GH_CLIENT_ID
              value: "$GH_CLIENT_ID"
            - name: GH_CLIENT_SECRET
              value: "$GH_CLIENT_SECRET"
            - name: GH_CALLBACK_URL
              value: https://app.ever.works/api/oauth/github/callback

            # Google Auth
            - name: GOOGLE_CLIENT_ID
              value: "$GOOGLE_CLIENT_ID"
            - name: GOOGLE_CLIENT_SECRET
              value: "$GOOGLE_CLIENT_SECRET"
            - name: GOOGLE_CALLBACK_URL
              value: https://app.ever.works/api/oauth/google/callback

            # Facebook Auth
            - name: FACEBOOK_CLIENT_ID
              value: "$FACEBOOK_CLIENT_ID"
            - name: FACEBOOK_CLIENT_SECRET
              value: "$FACEBOOK_CLIENT_SECRET"
            - name: FACEBOOK_CALLBACK_URL
              value: https://app.ever.works/api/oauth/facebook/callback

            # LinkedIn Auth
            - name: LINKEDIN_CLIENT_ID
              value: "$LINKEDIN_CLIENT_ID"
            - name: LINKEDIN_CLIENT_SECRET
              value: "$LINKEDIN_CLIENT_SECRET"
            - name: LINKEDIN_CALLBACK_URL
              value: https://app.ever.works/api/oauth/linkedin/callback

            # Plugins
            - name: PLUGIN_OPENROUTER_API_KEY
              value: "$PLUGIN_OPENROUTER_API_KEY"
            - name: PLUGIN_OPENROUTER_DEFAULT_MODEL
              value: "$PLUGIN_OPENROUTER_DEFAULT_MODEL"
            - name: PLUGIN_OPENROUTER_SIMPLE_MODEL
              value: "$PLUGIN_OPENROUTER_SIMPLE_MODEL"
            - name: PLUGIN_OPENROUTER_MEDIUM_MODEL
              value: "$PLUGIN_OPENROUTER_MEDIUM_MODEL"
            - name: PLUGIN_OPENROUTER_COMPLEX_MODEL
              value: "$PLUGIN_OPENROUTER_COMPLEX_MODEL"
            - name: PLUGIN_GITHUB_CLIENT_ID
              value: "$PLUGIN_GITHUB_CLIENT_ID"
            - name: PLUGIN_GITHUB_CLIENT_SECRET
              value: "$PLUGIN_GITHUB_CLIENT_SECRET"
            - name: PLUGIN_TAVILY_API_KEY
              value: "$PLUGIN_TAVILY_API_KEY"
            - name: PLUGIN_SCREENSHOTONE_ACCESS_KEY
              value: "$PLUGIN_SCREENSHOTONE_ACCESS_KEY"
            - name: PLUGIN_SCREENSHOTONE_SECRET_KEY
              value: "$PLUGIN_SCREENSHOTONE_SECRET_KEY"

            # Database
            - name: DATABASE_TYPE
              value: "$DATABASE_TYPE"
            - name: DATABASE_URL
              value: "$DATABASE_URL"
            - name: DATABASE_HOST
              value: "$DATABASE_HOST"
            - name: DATABASE_PORT
              value: "$DATABASE_PORT"
            - name: DATABASE_USERNAME
              value: "$DATABASE_USERNAME"
            - name: DATABASE_PASSWORD
              value: "$DATABASE_PASSWORD"
            - name: DATABASE_NAME
              value: "$DATABASE_NAME"
            - name: DATABASE_SSL_MODE
              value: "$DATABASE_SSL_MODE"
            - name: DATABASE_CA_CERT
              value: "$DATABASE_CA_CERT"
            # C-07: schema migrations are run via the migration step in
            # `.deploy/docker/api/entrypoint.sh`. TypeORM `synchronize` must
            # NOT run in production — it can silently drop columns / re-create
            # tables on the live DB, contradicting the project's own
            # constitution (.specify/memory/constitution.md). Force it off.
            - name: DATABASE_AUTOMIGRATE
              value: "false"

            # 2026-05-17 audit env (PR ever-works#816 — see THREAT-MODEL.md)
            - name: PLUGIN_SECRET_ENCRYPTION_KEY
              value: "$PLUGIN_SECRET_ENCRYPTION_KEY"
            # EW-716 (#1262): master key for at-rest encryption of operator
            # secrets. REQUIRED at boot in non-local envs (the API crash-loops
            # without it). Sourced from the PLATFORM_ENCRYPTION_KEY GitHub secret.
            - name: PLATFORM_ENCRYPTION_KEY
              value: "$PLATFORM_ENCRYPTION_KEY"
            - name: COMMUNITY_PR_VERIFIED_ORGS
              value: "$COMMUNITY_PR_VERIFIED_ORGS"
            - name: AGENT_BASH_AUDIT_LOG
              value: "$AGENT_BASH_AUDIT_LOG"
            # C-04: host allow-list for user-supplied callback URLs.
            # WEB_URL's host is always allowed by default — list extras here.
            - name: ALLOWED_CALLBACK_HOSTS
              value: "$ALLOWED_CALLBACK_HOSTS"
            # H-17: per-user login lockout knobs (5 fails / 15 min by default).
            - name: LOGIN_LOCKOUT_THRESHOLD
              value: "$LOGIN_LOCKOUT_THRESHOLD"
            - name: LOGIN_LOCKOUT_DURATION_MS
              value: "$LOGIN_LOCKOUT_DURATION_MS"
            # M-19: HTTP body parser limit (default 1mb).
            - name: BODY_LIMIT
              value: "$BODY_LIMIT"

            # Mail
            - name: MAILER_PROVIDER
              value: "$MAILER_PROVIDER"
            - name: EMAIL_FROM
              value: "$EMAIL_FROM"
            - name: SMTP_HOST
              value: "$SMTP_HOST"
            - name: SMTP_PORT
              value: "$SMTP_PORT"
            - name: SMTP_SECURE
              value: "$SMTP_SECURE"
            - name: SMTP_IGNORE_TLS
              value: "$SMTP_IGNORE_TLS"
            - name: SMTP_USER
              value: "$SMTP_USER"
            - name: SMTP_PASSWORD
              value: "$SMTP_PASSWORD"
            - name: RESEND_APIKEY
              value: "$RESEND_APIKEY"
            - name: RESEND_EMAIL_FROM
              value: "$RESEND_EMAIL_FROM"

            # Ever Works Git (EW-608) — onboarding-wizard-v2 storage provider.
            # Gates EverWorksGitProvider which pushes per-Work repos to the
            # platform-owned GitHub org. PAT is org-scoped to ever-works-cloud
            # only. See docs/specs/features/onboarding-wizard-v2/deployment.md §1.
            - name: STORAGE_EVER_WORKS_GIT_ENABLED
              value: "$STORAGE_EVER_WORKS_GIT_ENABLED"
            - name: EVER_WORKS_CUSTOMERS_GITHUB_ORG
              value: "$EVER_WORKS_CUSTOMERS_GITHUB_ORG"
            - name: EVER_WORKS_CUSTOMERS_GITHUB_PAT
              value: "$EVER_WORKS_CUSTOMERS_GITHUB_PAT"
            - name: EVER_WORKS_CUSTOMERS_GITHUB_VISIBILITY
              value: "$EVER_WORKS_CUSTOMERS_GITHUB_VISIBILITY"

            # EW-616 — platform-managed kubeconfigs for the k8s deploy
            # plugin's `clusterSource ∈ {k8s-works, k8s-gauzy}` paths.
            # Mounted from the `ever-works-platform-kubeconfigs` Secret
            # (defined at the top of this manifest). Kubernetes
            # auto-base64-decodes Secret.data when mounting via
            # secretKeyRef, so the container sees raw kubeconfig YAML.
            - name: EVER_WORKS_K8S_WORKS_KUBECONFIG
              valueFrom:
                secretKeyRef:
                  name: ever-works-platform-kubeconfigs
                  key: EVER_WORKS_K8S_WORKS_KUBECONFIG
            - name: EVER_WORKS_K8S_GAUZY_KUBECONFIG
              valueFrom:
                secretKeyRef:
                  name: ever-works-platform-kubeconfigs
                  key: EVER_WORKS_K8S_GAUZY_KUBECONFIG

            # EW-617 — zero-friction Ever Works deploy provider.
            # Gates the 'ever-works' choice in the deploy facade; default is
            # vercel until this is on. Also turns the subdomain DNS
            # automation live when paired with the CLOUDFLARE_* secrets.
            - name: DEPLOY_EVER_WORKS_ENABLED
              value: "$DEPLOY_EVER_WORKS_ENABLED"
            - name: EVER_WORKS_DOMAIN
              value: "$EVER_WORKS_DOMAIN"
            - name: EVER_WORKS_DEPLOY_LB_HOSTNAME
              value: "$EVER_WORKS_DEPLOY_LB_HOSTNAME"
            - name: CLOUDFLARE_API_TOKEN
              value: "$CLOUDFLARE_API_TOKEN"
            - name: CLOUDFLARE_ZONE_ID
              value: "$CLOUDFLARE_ZONE_ID"

            # EW-617 G7 — captcha verifier. Provider-agnostic
            # (Turnstile/hCaptcha/reCAPTCHA). No-ops when CAPTCHA_PROVIDER
            # is empty so we can ship the env wiring without enabling
            # captcha at the same time.
            - name: CAPTCHA_PROVIDER
              value: "$CAPTCHA_PROVIDER"
            - name: CAPTCHA_SECRET
              value: "$CAPTCHA_SECRET"

          resources:
            requests:
              # 2026-06-06 right-sizing: live `kubectl top pod` measured ~430
              # MiB / replica steady on the 2 prod pods (post-#1190 lazy-proxy
              # fix). The historical "~0.4-1.2 GiB under load" range from the
              # earlier comment block reflected the pre-#1190 chat regression
              # and is no longer representative — 672 MiB request reserves
              # ~1.5x current steady-state with the 3 GiB limit still
              # catching any unexpected spike.
              # CPU 500m → 300m: observed peak ~58m / pod, 300m leaves >5x
              # headroom and frees 0.4 cores cluster-wide across 2 replicas.
              memory: "672Mi"
              cpu: "300m"
            limits:
              memory: "3Gi"
              cpu: "2"

          ports:
            - containerPort: 3100
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # EW-693 / FR-13a — Startup probe with a generous deadline so
          # the boot reconcile warmup (`PluginBootstrapService.warmupDynamicPlugins`,
          # wired in ApiModule.onApplicationBootstrap) has time to
          # pre-install the DB-recorded distributable plugins from the
          # configured registry into /app/plugins on a fresh pod. In
          # bundled mode the warmup is a no-op and this probe still
          # passes quickly via the normal /api/health path.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3100
            # 60 attempts * 5s = up to 5 min for the warmup install
            # storm on a brand-new pod with an empty store. Tighten if
            # observability shows it routinely finishes faster.
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5

          volumeMounts:
            - name: git-repos
              mountPath: /tmp/ever-works-repos
            # NOTE (incident 2026-06-07): do NOT mount any volume at
            # `/app/plugins` while running in `PLUGIN_DISTRIBUTION_MODE=bundled`.
            # The bundled image BAKES all ~66 plugins into `/app/plugins`
            # (Dockerfile `.deploy/docker/api/Dockerfile` →
            # `COPY --from=installer /app/deploy/plugins ./plugins`). An
            # `emptyDir` here shadows them, so `PluginLoaderService`
            # discovers 0 plugins, the registry stays empty, and every
            # AI / search / deploy capability (incl. the chat assistant)
            # fails with `<capability> provider not found`. That is exactly
            # the outage this volume previously caused.
            #
            # The EW-693 dynamic installer's writable store
            # (`PLUGIN_INSTALL_DIR`, default `/app/plugins`) is only needed
            # when `PLUGIN_DISTRIBUTION_MODE=dynamic`. When dynamic mode is
            # adopted here, point `PLUGIN_INSTALL_DIR` at a SEPARATE path
            # (e.g. `/app/plugins-runtime`) and mount the writable volume
            # THERE so it never shadows the baked core plugins — do not
            # re-add a mount at `/app/plugins`.

      volumes:
        - name: git-repos
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ever-works-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ever-works-web
  template:
    metadata:
      labels:
        app: ever-works-web
    spec:
      # H-20: pod-level hardening. Same shape as the API deployment —
      # non-root with seccomp/RuntimeDefault, container drops all caps
      # and disables privilege escalation. `readOnlyRootFilesystem` stays
      # false (Next.js writes to `.next/cache` etc; flipping it on is a
      # follow-up that needs an emptyDir volume).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: ever-works-web
          image: registry.digitalocean.com/ever/ever-works-web:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AUTH_SECRET
              value: "$AUTH_SECRET"
            - name: WEB_URL
              value: "https://app.ever.works"
            - name: API_URL
              value: "http://ever-works-api:3100"
            - name: NEXT_PUBLIC_WEB_URL
              value: "https://app.ever.works"

            # PostHog (server-side: feature flag eval via apps/web/src/lib/feature-flags)
            # + Sentry (errors + traces). See knowledge/infrastructure/EVER_WORKS_POSTHOG.md.
            # NEXT_PUBLIC_POSTHOG_KEY / NEXT_PUBLIC_POSTHOG_HOST are intentionally NOT
            # set here — Next.js bakes NEXT_PUBLIC_* into the bundle at BUILD time,
            # so they're plumbed through the docker-build workflow's build-args
            # (see .github/workflows/docker-build-publish-prod.yml) and the web
            # Dockerfile's ARG/ENV declarations.
            - name: SENTRY_DSN
              value: "$SENTRY_DSN"
            - name: SENTRY_ENVIRONMENT
              value: "$SENTRY_ENVIRONMENT"
            - name: POSTHOG_API_KEY
              value: "$POSTHOG_API_KEY"
            - name: POSTHOG_HOST
              value: "$POSTHOG_HOST"
          ports:
            - containerPort: 3000
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              # 2026-06-06 right-sizing: live `kubectl top pod` measured
              # ~71 MiB / replica steady (Next.js SSR, 2 prod replicas).
              # 192 MiB request leaves ~2.5x headroom for SSR spikes; 512 MiB
              # limit untouched. CPU 250m → 100m frees 0.3 cores across the
              # 2 replicas (observed peak 9m, kept enough for SSR bursts).
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ever-works-web-ing
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: app.ever.works
      http:
        paths:
          - backend:
              service:
                name: ever-works-web
                port:
                  number: 3000
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - app.ever.works
      secretName: app.ever.works-tls

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ever-works-api-ing
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.ever.works
      http:
        paths:
          - backend:
              service:
                name: ever-works-api
                port:
                  number: 3100
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - api.ever.works
      secretName: api.ever.works-tls
