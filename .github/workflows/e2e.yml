name: E2E Tests

# Playwright e2e suite — auto-starts API (sqlite in-memory) + Next.js dev
# server in the runner, then runs all specs from apps/web/e2e/.
#
# Scope: only the long-lived branches develop / stage / main. Skipping PRs
# and feature branches deliberately — Playwright on ubicloud-standard-8 is
# expensive and the existing CI workflow already lints + builds + unit-tests
# every push.
#
# Trigger via "Run workflow" on any branch when you want a one-off run.

on:
  push:
    branches: [develop, stage, main]
  workflow_dispatch:

# M-12: minimum default permissions. Individual jobs can elevate where needed.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubicloud-standard-8
    # 150 min covers the current 1-worker × 333-spec suite even with retries
    # and slow specs. The prior 45-min ceiling was too tight: a single full
    # run on develop hit the wall partway through. Keep the headroom while
    # we work through suite-level test debt; revisit downward only once the
    # suite consistently finishes well under it.
    timeout-minutes: 150

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    # Service containers — let the e2e suite exercise features that would
    # otherwise skip themselves because the dependency isn't reachable.
    #   - mailhog: SMTP sink on :1025 + web UI on :8025. Lets the email-
    #     verification / password-reset / magic-link / invitation specs
    #     actually send and (optionally) inspect outbound mail. No auth
    #     required, no TLS, no real network egress.
    #   - redis:   distributed throttler / rate-limit / cache backend.
    #     Most of our cache/lock infra targets the `cache_entries` SQL
    #     table, but the throttler picks up `THROTTLER_REDIS_URL` to
    #     enable cross-replica rate limits, and several `rate-limit-*`
    #     and `cache-*` specs check for those behaviours.
    services:
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.13.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (excluding docs)
        run: pnpm build --filter=!./apps/docs

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Start dev servers, wait, run Playwright
        # Background processes started in one `run:` step are killed when the
        # step ends — so we spawn API + Web AND wait AND run tests inside the
        # same step. nohup + disown to fully detach from the shell.
        #
        # Both web and Playwright helpers consume API_URL as a bare host —
        # web's lib/constants.ts auto-appends '/api', and helpers/api.ts
        # prepends '/api/...' to each request. Keep these aligned.
        working-directory: apps/web
        run: |
          set -e

          echo "::group::Starting API on :3100"
          nohup pnpm --filter ever-works-api dev > /tmp/api.log 2>&1 &
          API_PID=$!
          disown $API_PID
          echo "API pid=$API_PID"
          echo "::endgroup::"

          echo "::group::Starting Web on :3000"
          nohup pnpm --filter ever-works-web dev > /tmp/web.log 2>&1 &
          WEB_PID=$!
          disown $WEB_PID
          echo "Web pid=$WEB_PID"
          echo "::endgroup::"

          echo "Waiting for API on :3100 ..."
          timeout 180 bash -c 'until curl -sSf http://localhost:3100/api/health > /dev/null; do sleep 3; done' \
            || { echo "API never came up — last 80 lines:"; tail -n 80 /tmp/api.log || true; exit 1; }
          echo "API ready."

          echo "Waiting for Web on :3000 ..."
          timeout 240 bash -c 'until curl -sSf http://localhost:3000/en/login > /dev/null; do sleep 3; done' \
            || { echo "Web never came up — last 80 lines:"; tail -n 80 /tmp/web.log || true; exit 1; }
          echo "Web ready."

          echo "::group::Running Playwright e2e suite"
          # Trap to dump API + Web stdout on Playwright failure — without this
          # we can only see the test-runner's view (e.g. `Expected: 200,
          # Received: 401`) and not why the API was rejecting. The dev-server
          # stdout is the authoritative source for NestJS exceptions and
          # Better Auth's request-flow logging.
          trap '{
            echo "::group::API log (last 200 lines)"
            tail -n 200 /tmp/api.log || true
            echo "::endgroup::"
            echo "::group::Web log (last 200 lines)"
            tail -n 200 /tmp/web.log || true
            echo "::endgroup::"
          }' EXIT
          pnpm exec playwright test
          echo "::endgroup::"
        env:
          # API
          DATABASE_TYPE: sqlite
          DATABASE_IN_MEMORY: 'true'
          # H-14 (PR #816) raised the floor on COOKIE_SECRET / AUTH_SECRET
          # to 32 characters of high-entropy material and removed the silent
          # short-secret padding. The previous 24-char value broke cookie
          # encryption in the web's `setAuthCookies` → registration succeeded
          # but no session cookie was set → every subsequent request 401'd.
          # Padded to 51 chars (CI-only, obviously fake — do not reuse).
          AUTH_SECRET: ever-works-e2e-ci-secret-padding-to-meet-32min-fake
          NODE_ENV: development
          # C-07 PR-B: `autoMigrate()` now defaults to OFF everywhere except
          # `NODE_ENV=test`. E2E boots a real dev-mode API with in-memory
          # sqlite, so the tables must be created via TypeORM `synchronize`
          # before Playwright fires. Set this explicitly instead of flipping
          # NODE_ENV (which would change other dev-vs-test branches).
          DATABASE_AUTOMIGRATE: 'true'
          # H-07: Better Auth now requires email verification before sign-in.
          # The E2E suite registers users via API and immediately logs in;
          # without disabling the check here, every login returns 403
          # EMAIL_NOT_VERIFIED. Production still enforces the check (default
          # `true`); `false` is opt-in for test contexts only.
          REQUIRE_EMAIL_VERIFICATION: 'false'
          # SMTP — point at the mailhog service container above. The
          # specs that exercise the email flow (verification, reset,
          # magic-link, invitation) can now actually emit mail. The
          # MailerService still no-ops if MAILER_PROVIDER is unset,
          # so we explicitly opt into the smtp transport.
          MAILER_PROVIDER: smtp
          SMTP_HOST: 127.0.0.1
          SMTP_PORT: '1025'
          SMTP_IGNORE_TLS: 'true'
          SMTP_SECURE: 'false'
          EMAIL_FROM_EMAIL: e2e-noreply@ever.works
          # MailHog HTTP API for specs that want to read back sent mail
          # to extract verification / reset tokens for end-to-end flows.
          MAILHOG_URL: http://127.0.0.1:8025
          # Redis — wire up the throttler so distributed rate-limit
          # specs see cross-replica behaviour instead of the in-memory
          # fallback. Per @nest-lab/throttler-storage-redis we just
          # need the URL; the package is optional and silently falls
          # back if not installed.
          REDIS_URL: redis://127.0.0.1:6379
          THROTTLER_REDIS_URL: redis://127.0.0.1:6379
          # Subscriptions — flip the kill-switch so the plan / tier /
          # billing-grace specs run their real branches. The default
          # disabled state returns `plan: { code: 'free' }` (post-fix
          # b709f9cb) but several specs assert paid-tier transitions
          # that only fire when the module is on.
          SUBSCRIPTIONS_ENABLED: 'true'
          # OAuth — register test sentinels so the providers appear in
          # /api/auth/providers and the OAuth-flow specs can reach
          # /api/oauth/<provider>/authorize. The actual github.com /
          # accounts.google.com endpoints will reject these client_ids,
          # but each spec mocks the upstream provider at the
          # Playwright route() layer so the real provider never sees
          # the request. The credentials only need to exist for the
          # platform-side provider registration to succeed.
          GH_CLIENT_ID: e2e-fake-github-client-id
          GH_CLIENT_SECRET: e2e-fake-github-client-secret-padding-to-32+
          GOOGLE_CLIENT_ID: e2e-fake-google-client-id
          GOOGLE_CLIENT_SECRET: e2e-fake-google-client-secret-padding-to-32+
          # Platform secrets — set fake-but-shaped values so guards that
          # require them at boot pass.
          # - PLATFORM_API_SECRET_TOKEN: bearer for /api/activity-log/ingest
          #   (PlatformSecretGuard, EW-120). Without it the guard 401s
          #   even for valid callers and the ingest specs can't be
          #   exercised end-to-end.
          # - PLATFORM_ENCRYPTION_KEY: AES-256-GCM key (64 hex chars =
          #   32 bytes) used by PlatformSyncSecretService.rotate. The
          #   activity-sync rotate-secret spec needs this to succeed,
          #   not just 409.
          PLATFORM_API_SECRET_TOKEN: e2e-platform-secret-token-deterministic-32+chars
          PLATFORM_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          # Web
          API_URL: http://localhost:3100
          NEXT_PUBLIC_API_URL: http://localhost:3100/api
          WEB_URL: http://localhost:3000
          # CORS — declare the dev server origin explicitly so:
          # 1. cors-origin-allowlist e2e contract sees a non-default
          #    allowlist (the fallback `localhost:3000` works fine but
          #    sourcing it from env exercises the same plumbing prod uses).
          # 2. Auth callback URLs may use either /api or web routes;
          #    ALLOWED_CALLBACK_HOSTS keeps the host allow-list aligned
          #    so reset/verify links built against the web origin pass
          #    the C-04 host check.
          ALLOWED_ORIGINS: http://localhost:3000
          ALLOWED_CALLBACK_HOSTS: localhost:3000
          # Playwright
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.ref_name }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report
            apps/web/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-${{ github.ref_name }}-${{ github.run_attempt }}
          path: |
            /tmp/api.log
            /tmp/web.log
          retention-days: 7
          if-no-files-found: ignore

  # Prod-build sub-job — runs ONLY the specs that need `next start`
  # (bundle-size budgets, _next/static fingerprint + long Cache-Control).
  # `next dev` ships unminified React + unsplit chunks and emits
  # `Cache-Control: no-store`, so those invariants only hold against
  # a production build. Keeping this a separate, focused job means we
  # don't pay the cost of a prod build for the 1000+ dev-mode specs
  # while still validating the ~4 prod-only invariants.
  e2e-prod-build:
    runs-on: ubicloud-standard-8
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10.13.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (excluding docs)
        run: pnpm build --filter=!./apps/docs

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Start API + prod web (`next start`), run prod-only specs
        working-directory: apps/web
        run: |
          set -e

          echo "::group::Starting API on :3100"
          nohup pnpm --filter ever-works-api dev > /tmp/api.log 2>&1 &
          disown $!
          echo "::endgroup::"

          echo "::group::Starting prod web on :3000 (next start)"
          # `pnpm build` (above) already produced .next; just boot the
          # prod server. NODE_ENV=production must be set BEFORE start
          # so Next emits long Cache-Control + hashed chunks.
          NODE_ENV=production nohup pnpm --filter ever-works-web start > /tmp/web.log 2>&1 &
          disown $!
          echo "::endgroup::"

          echo "Waiting for API on :3100 ..."
          timeout 180 bash -c 'until curl -sSf http://localhost:3100/api/health > /dev/null; do sleep 3; done' \
            || { echo "API never came up — last 80 lines:"; tail -n 80 /tmp/api.log || true; exit 1; }

          echo "Waiting for prod Web on :3000 ..."
          timeout 240 bash -c 'until curl -sSf http://localhost:3000/en/login > /dev/null; do sleep 3; done' \
            || { echo "Prod Web never came up — last 80 lines:"; tail -n 80 /tmp/web.log || true; exit 1; }

          echo "::group::Running prod-only Playwright specs"
          trap '{
            echo "::group::API log (last 200 lines)"
            tail -n 200 /tmp/api.log || true
            echo "::endgroup::"
            echo "::group::Web log (last 200 lines)"
            tail -n 200 /tmp/web.log || true
            echo "::endgroup::"
          }' EXIT
          pnpm exec playwright test bundle-size-budget static-asset-fingerprint
          echo "::endgroup::"
        env:
          # API + web env mirror the dev-mode job above; the only delta
          # is NODE_ENV=production for the web server (set inline on
          # the `start` command) so the asset-fingerprint / bundle-
          # size invariants apply.
          DATABASE_TYPE: sqlite
          DATABASE_IN_MEMORY: 'true'
          AUTH_SECRET: ever-works-e2e-ci-secret-padding-to-meet-32min-fake
          NODE_ENV: development # API stays in dev for in-memory DB
          DATABASE_AUTOMIGRATE: 'true'
          REQUIRE_EMAIL_VERIFICATION: 'false'
          API_URL: http://localhost:3100
          NEXT_PUBLIC_API_URL: http://localhost:3100/api
          WEB_URL: http://localhost:3000
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # E2E_PROD_BUILD signals the prod-only specs that the web
          # server is running under `next start` (so bundle-size +
          # static-asset-fingerprint should run their full assertions,
          # not skip). Decoupled from NODE_ENV so the test runner can
          # stay in 'development' while the served pages are prod.
          E2E_PROD_BUILD: '1'

      - name: Upload Playwright prod-build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-build-report-${{ github.ref_name }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report
            apps/web/e2e/test-results
          retention-days: 14
          if-no-files-found: ignore
