name: Build and Publish Docker Images MCP Dev

on:
  push:
    branches: [develop]
    paths:
      - 'apps/mcp/**'
      - '.deploy/docker/mcp/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ever-works-mcp:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          driver: docker

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: .deploy/docker/mcp/Dockerfile
          load: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ever-works/ever-works-mcp-dev:latest
            everco/ever-works-mcp-dev:latest
            registry.digitalocean.com/ever/ever-works-mcp-dev:latest
          cache-from: type=registry,ref=ghcr.io/ever-works/ever-works-mcp-dev:latest
          cache-to: type=inline
          build-args: |
            NODE_ENV=development
            VERDACCIO_REGISTRY=${{ vars.VERDACCIO_REGISTRY }}

      - name: Docker images list
        run: |
          sudo docker image list

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub Registry
        continue-on-error: true
        run: |
          docker push everco/ever-works-mcp-dev:latest

      - name: Install doctl
        if: ${{ vars.DO_ENABLED == 'true' }}
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f  # v2
        continue-on-error: true
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        if: ${{ vars.DO_ENABLED == 'true' }}
        continue-on-error: true
        run: doctl registry login --expiry-seconds 3600

      - name: Push to DigitalOcean Registry
        if: ${{ vars.DO_ENABLED == 'true' }}
        continue-on-error: true
        run: |
          docker push registry.digitalocean.com/ever/ever-works-mcp-dev:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Github Registry
        run: |
          docker push ghcr.io/ever-works/ever-works-mcp-dev:latest

      - name: Login to CW Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        continue-on-error: true
        with:
          registry: ${{ secrets.CW_DOCKER_REGISTRY }}
          username: ${{ secrets.CW_DOCKER_USER }}
          password: ${{ secrets.CW_DOCKER_USER_PASSWORD }}

