name: Deploy to DO Prod

on:
  workflow_run:
    workflows: ['Build and Publish Docker Images Prod']
    branches: [main]
    types:
      - completed

# M-12: minimum default permissions. Individual jobs can elevate where needed.
permissions:
  contents: read

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    environment:
      name: prod
      url: https://app.ever.works

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f  # v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 k8s-gauzy

      - name: Write PostgreSQL Certificate file
        run: |
          echo "$DB_CA_CERT" | base64 --decode > ${HOME}/ca-certificate.crt
        env:
          DB_CA_CERT: '${{ secrets.DATABASE_CA_CERT }}'

      - name: Generate TLS Secrets
        # M-13: pass secrets via `env:` and double-quote `"$VAR"` instead of
        # interpolating `${{ secrets.X }}` directly into the shell. Inline
        # interpolation expands client-side and a secret containing shell
        # metacharacters (backticks, $(...), etc.) would break the step or
        # — in pathological cases — leak via shell expansion.
        run: |
          rm -f ${HOME}/ingress.api.crt ${HOME}/ingress.api.key ${HOME}/ingress.webapp.crt ${HOME}/ingress.webapp.key
          echo "$INGRESS_API_CERT" | base64 --decode > ${HOME}/ingress.api.crt
          echo "$INGRESS_API_CERT_KEY" | base64 --decode > ${HOME}/ingress.api.key
          echo "$INGRESS_WEBAPP_CERT" | base64 --decode > ${HOME}/ingress.webapp.crt
          echo "$INGRESS_WEBAPP_CERT_KEY" | base64 --decode > ${HOME}/ingress.webapp.key
          kubectl create secret tls api.ever.works-tls --save-config --dry-run=client --cert=${HOME}/ingress.api.crt --key=${HOME}/ingress.api.key -o yaml | kubectl --context do-sfo2-k8s-gauzy apply -f -
          kubectl create secret tls app.ever.works-tls --save-config --dry-run=client --cert=${HOME}/ingress.webapp.crt --key=${HOME}/ingress.webapp.key -o yaml | kubectl --context do-sfo2-k8s-gauzy apply -f -
        env:
          INGRESS_API_CERT: ${{ secrets.INGRESS_API_CERT }}
          INGRESS_API_CERT_KEY: ${{ secrets.INGRESS_API_CERT_KEY }}
          INGRESS_WEBAPP_CERT: ${{ secrets.INGRESS_WEBAPP_CERT }}
          INGRESS_WEBAPP_CERT_KEY: ${{ secrets.INGRESS_WEBAPP_CERT_KEY }}

      - name: Apply k8s manifests changes in DigitalOcean k8s cluster (if any)
        run: |
          envsubst < $GITHUB_WORKSPACE/.deploy/k8s/k8s-manifest.prod.yaml | kubectl --context do-sfo2-k8s-gauzy apply -f -
        env:
          # API ENV
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          WEB_URL: https://app.ever.works
          ALLOWED_ORIGINS: https://app.ever.works,https://api.ever.works,https://ever.works
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

          # Trigger.dev
          TRIGGER_ENABLED: ${{ secrets.TRIGGER_ENABLED }}
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
          TRIGGER_INTERNAL_SECRET: ${{ secrets.TRIGGER_INTERNAL_SECRET }}
          TRIGGER_MACHINE: ${{ secrets.TRIGGER_MACHINE }}

          # GitHub Auth
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_CALLBACK_URL: https://app.ever.works/api/oauth/github/callback

          # Google Auth
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: https://app.ever.works/api/oauth/google/callback

          # Facebook Auth
          FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
          FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
          FACEBOOK_CALLBACK_URL: https://app.ever.works/api/oauth/facebook/callback

          # LinkedIn Auth
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_CALLBACK_URL: https://app.ever.works/api/oauth/linkedin/callback

          # Plugins
          PLUGIN_OPENROUTER_API_KEY: ${{ secrets.PLUGIN_OPENROUTER_API_KEY }}
          PLUGIN_OPENROUTER_DEFAULT_MODEL: ${{ secrets.PLUGIN_OPENROUTER_DEFAULT_MODEL }}
          PLUGIN_OPENROUTER_SIMPLE_MODEL: ${{ secrets.PLUGIN_OPENROUTER_SIMPLE_MODEL }}
          PLUGIN_OPENROUTER_MEDIUM_MODEL: ${{ secrets.PLUGIN_OPENROUTER_MEDIUM_MODEL }}
          PLUGIN_OPENROUTER_COMPLEX_MODEL: ${{ secrets.PLUGIN_OPENROUTER_COMPLEX_MODEL }}
          PLUGIN_GITHUB_CLIENT_ID: ${{ secrets.PLUGIN_GITHUB_CLIENT_ID }}
          PLUGIN_GITHUB_CLIENT_SECRET: ${{ secrets.PLUGIN_GITHUB_CLIENT_SECRET }}
          PLUGIN_TAVILY_API_KEY: ${{ secrets.PLUGIN_TAVILY_API_KEY }}
          PLUGIN_SCREENSHOTONE_ACCESS_KEY: ${{ secrets.PLUGIN_SCREENSHOTONE_ACCESS_KEY }}
          PLUGIN_SCREENSHOTONE_SECRET_KEY: ${{ secrets.PLUGIN_SCREENSHOTONE_SECRET_KEY }}

          # Database
          DATABASE_TYPE: ${{ secrets.DATABASE_TYPE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          # Enable SSL/TLS for database connections (true/false)
          DATABASE_SSL_MODE: ${{ secrets.DATABASE_SSL_MODE }}
          DATABASE_CA_CERT: ${{ secrets.DATABASE_CA_CERT }}

          # Mail
          MAILER_PROVIDER: ${{ secrets.MAILER_PROVIDER }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

          # SMTP
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_IGNORE_TLS: ${{ secrets.SMTP_IGNORE_TLS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

          # Resend
          RESEND_APIKEY: ${{ secrets.RESEND_APIKEY }}
          RESEND_EMAIL_FROM: ${{ secrets.RESEND_EMAIL_FROM }}

          # Ever Works Git (EW-608) — onboarding-wizard-v2 storage provider.
          # PAT is fine-grained, scoped to ever-works-cloud only. Non-secret
          # config (flag, org, visibility) is inlined here; only the PAT
          # comes from secrets. See deployment.md §1.
          STORAGE_EVER_WORKS_GIT_ENABLED: 'true'
          EVER_WORKS_CUSTOMERS_GITHUB_ORG: ever-works-cloud
          EVER_WORKS_CUSTOMERS_GITHUB_PAT: ${{ secrets.EVER_WORKS_CUSTOMERS_GITHUB_PAT }}
          EVER_WORKS_CUSTOMERS_GITHUB_VISIBILITY: private

          # EW-616 — kubeconfigs for platform-managed `clusterSource`
          # values on the k8s deploy plugin. Both are base64-encoded
          # so envsubst can splice them into Secret.data fields without
          # newline trouble; Kubernetes auto-decodes when mounting.
          EVER_WORKS_K8S_WORKS_KUBECONFIG_B64: ${{ secrets.EVER_WORKS_K8S_WORKS_KUBECONFIG_B64 }}
          EVER_WORKS_K8S_GAUZY_KUBECONFIG_B64: ${{ secrets.EVER_WORKS_K8S_GAUZY_KUBECONFIG_B64 }}

          # EW-617 — Ever Works zero-friction deploy + DNS automation.
          # DEPLOY_EVER_WORKS_ENABLED gates the 'ever-works' deploy
          # provider choice. CLOUDFLARE_* drive the subdomain DNS
          # automation. EVER_WORKS_DEPLOY_LB_HOSTNAME is the anchor record
          # that {slug}.ever.works CNAMEs target (resolves to the
          # k8s-works ingress LB at 157.230.74.11).
          DEPLOY_EVER_WORKS_ENABLED: 'true'
          EVER_WORKS_DOMAIN: ever.works
          EVER_WORKS_DEPLOY_LB_HOSTNAME: lb.ever.works
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

          # EW-617 G7 — captcha verifier. Empty defaults keep captcha
          # disabled; flip CAPTCHA_PROVIDER + CAPTCHA_SECRET when the
          # Turnstile widget is provisioned + client integration ships.
          CAPTCHA_PROVIDER: ${{ secrets.CAPTCHA_PROVIDER }}
          CAPTCHA_SECRET: ${{ secrets.CAPTCHA_SECRET }}

      # we need this step because for now we just use :latest tag
      # note: for production we will use different strategy later
      - name: Restart Pods to pick up :latest tag version
        run: |
          kubectl --context do-sfo2-k8s-gauzy rollout restart deployment/ever-works-api
          kubectl --context do-sfo2-k8s-gauzy rollout restart deployment/ever-works-web
