name: Deploy to Trigger.dev Dev

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types:
      - completed

# M-12: minimum default permissions. Individual jobs can elevate where needed.
permissions:
  contents: read

jobs:
  deploy:
    # Legacy Trigger.dev CLOUD path. Unlike release-trigger-{prod,stage}.yml this
    # job was left ungated when we migrated to self-hosted, so it kept running on
    # every develop push and authenticating to Trigger.dev CLOUD with the cloud
    # PAT (secrets.TRIGGER_ACCESS_TOKEN) — the one workload still reaching the
    # cloud account we are closing. Gated here on the same flag the prod/stage
    # workflows already use, so it is inert while TRIGGER_SELFHOSTED=true.
    # Flip the flag back to re-enable this cloud path.
    if: ${{ vars.TRIGGER_SELFHOSTED != 'true' }}
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build --filter './packages/**'

      - name: ðŸš€ Verify Trigger.dev is available
        working-directory: packages/tasks
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        # Note: we don't use the `preview` env in Trigger.dev for now for deployments from the develop branch,
        # because it requires a paid account and also because we want to use built-in scheduling in NestJs in the dev!
        # That's why we just run the login operation below.
        run: |
          pnpm dlx trigger.dev@4.4.6 login

