name: Deploy to Trigger.dev Stage

on:
  workflow_run:
    workflows: ["CI"]
    branches: [stage]
    types:
      - completed

# M-12: minimum default permissions. Individual jobs can elevate where needed.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    environment: stage

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.33.3

      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build --filter './packages/**'

      - name: Prepare plugins for Trigger.dev
        working-directory: packages/tasks
        run: pnpm prepare:plugins

      - name: ðŸš€ Deploy Trigger.dev to Development environment
        working-directory: packages/tasks
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: pnpm dlx trigger.dev@4.4.6 deploy --env staging

