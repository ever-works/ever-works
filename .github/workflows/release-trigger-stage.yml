name: Deploy to Trigger.dev Stage

on:
  workflow_run:
    workflows: ["CI"]
    branches: [stage]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubicloud-standard-2

    environment: stage

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.13.1

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build --filter './packages/**'

      - name: Prepare plugins for Trigger.dev
        working-directory: packages/tasks
        run: pnpm prepare:plugins

      - name: 🚀 Deploy Trigger.dev to Development environment
        working-directory: packages/tasks
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@4.4.0 deploy --env staging
