name: CI

on:
  push:
    branches: [main, develop, stage]
  pull_request:
    branches: [main, develop, stage]
  workflow_dispatch:

# M-12: explicit minimum default permissions for every job. Individual jobs
# can elevate to `write` only on the scope they need. Without this, any
# compromised third-party action runs with whatever the repo default grants
# (typically `contents: write`).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubicloud-standard-8

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # H-15: fail the build if any production transitive dep has a HIGH or
      # CRITICAL vulnerability. The existing `pnpm.overrides` block proves
      # maintainers already patch high/critical drift; this just makes it
      # CI-enforced so a new transitive doesn't slip through unnoticed.
      # Moderate findings stay as Dependabot work (re-evaluate the threshold
      # if the backlog becomes too noisy).
      - name: Audit production dependencies (high+)
        run: pnpm audit --prod --audit-level=high

      - name: Check formatting
        run: pnpm format:check

      - name: Build all packages
        run: pnpm build --filter=!./apps/docs

      - name: run test on all packages
        run: pnpm test

      - name: Build Internal CLI
        working-directory: apps/internal-cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Build External CLI
        working-directory: apps/cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Test Internal CLI
        working-directory: apps/internal-cli
        # NODE_ENV=test signals this is a test-context bootstrap (the CLI uses
        # in-memory sqlite here, not a real database). C-07 PR-B made
        # `autoMigrate()` default-off everywhere except NODE_ENV=test — without
        # this env, `synchronize` doesn't run and the eager NestJS bootstrap
        # hits "no such table: subscription_plans". Equivalent to setting
        # DATABASE_AUTOMIGRATE=true explicitly; NODE_ENV=test is the standard
        # test-context signal already used by the unit-test suite.
        env:
          NODE_ENV: test
        run: pnpm test:cli

      - name: Test External CLI
        working-directory: apps/cli
        # See note above on the Internal CLI step — same C-07 PR-B implication.
        env:
          NODE_ENV: test
        run: pnpm test:cli

  # EW-742 P6 T37 — per-provider job-runtime plugin matrix.
  #
  # Why a separate job: the aggregate `pnpm test` step in `lint-and-test`
  # passes/fails as a single signal. When a contract change in
  # `@ever-works/plugin` ripples through the 4 plugin packages, the
  # aggregate run hides WHICH plugin broke. This job fans each plugin's
  # test suite into its own cell so the failure signal is per-provider.
  #
  # Scope: contract + bindToTenant + dispatcher/worker-host factories +
  # T31 enqueue-options translators + T36-T40 tenant conformance suite
  # — all mocks-only. The real-infra portion of T37 (a `TENANT_OVERLAY=
  # {off|on}` × `JOB_RUNTIME={trigger|temporal|bullmq|pgboss|inngest}`
  # matrix against live Redis/Postgres/Temporal/Inngest service
  # containers) remains gated on CI infra availability — tracked in
  # tasks.md and ADR-017.
  #
  # Independent of `lint-and-test`: this job re-installs and re-builds
  # only the slice it needs, so a failing aggregate doesn't block this
  # signal (and vice versa).
  job-runtime-plugin-matrix:
    runs-on: ubicloud-standard-8

    strategy:
      fail-fast: false
      matrix:
        provider:
          - bullmq
          - pgboss
          - temporal
          - inngest
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @ever-works/plugin ships the contract surface + the
      # contracts-conformance subpath that each provider plugin imports
      # via `runJobRuntimeContractSuite` / `runJobRuntimeTenantContractSuite`
      # / `runSecretStoreContractSuite`. Build it first so the
      # downstream plugin's vitest can resolve the subpath.
      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter @ever-works/plugin build

      - name: Test @ever-works/job-runtime-${{ matrix.provider }}-plugin
        run: pnpm --filter @ever-works/job-runtime-${{ matrix.provider }}-plugin test

  # EW-742 P6 T32/T37 real-infra axis — all 4 push-model providers
  # against live infra: BullMQ on Redis, pg-boss on Postgres, Temporal
  # via temporalio/auto-setup (shares the Postgres service, Temporal
  # namespaces its own tables), Inngest via the inngest/inngest dev
  # server. Real-infra cells run as a SEPARATE job from the mocks-only
  # matrix so an infra hiccup doesn't mask the mocks-only failure signal.
  job-runtime-real-infra:
    runs-on: ubicloud-standard-8
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      temporal:
        image: temporalio/auto-setup:latest
        env:
          DB: postgres12
          DB_PORT: '5432'
          POSTGRES_USER: test
          POSTGRES_PWD: test
          POSTGRES_SEEDS: postgres
        ports: ['7233:7233']
        # auto-setup boots in 60-90s; generous start-period + retries
        # absorb the warm-up without flaking the job.
        options: --health-cmd "nc -z localhost 7233" --health-interval 10s --health-timeout 5s --health-retries 12 --health-start-period 30s
      inngest:
        image: inngest/inngest:latest
        ports: ['8288:8288']
        options: --health-cmd "wget -qO- http://localhost:8288/ || exit 1" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter @ever-works/plugin build

      - name: BullMQ real-infra
        env:
          EW_TEST_REAL_REDIS_URL: redis://localhost:6379
        run: pnpm --filter @ever-works/job-runtime-bullmq-plugin test

      - name: pg-boss real-infra
        env:
          EW_TEST_REAL_PGBOSS_URL: postgres://test:test@localhost:5432/test
        run: pnpm --filter @ever-works/job-runtime-pgboss-plugin test

      - name: Temporal real-infra
        env:
          EW_TEST_REAL_TEMPORAL_ADDRESS: localhost:7233
        run: pnpm --filter @ever-works/job-runtime-temporal-plugin test

      - name: Inngest real-infra
        env:
          EW_TEST_REAL_INNGEST_URL: http://localhost:8288
        run: pnpm --filter @ever-works/job-runtime-inngest-plugin test

  # Companion matrix for the secret-store-resolver provider family
  # (EW-742 P3.2 / P6 — runSecretStoreContractSuite is wired into all 7
  # plugins via `<plugin>-conformance.spec.ts`). Same rationale as the
  # job-runtime matrix above: per-provider failure signal.
  secret-store-plugin-matrix:
    runs-on: ubicloud-standard-8

    strategy:
      fail-fast: false
      matrix:
        provider:
          - vault
          - k8s
          - infisical
          - doppler
          - aws-sm
          - gcp-sm
          - azure-kv
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter @ever-works/plugin build

      - name: Test @ever-works/secret-store-${{ matrix.provider }}-plugin
        run: pnpm --filter @ever-works/secret-store-${{ matrix.provider }}-plugin test
