name: CI

on:
  push:
    branches: [main, develop, stage]
  pull_request:
    branches: [main, develop, stage]
  workflow_dispatch:

# M-12: explicit minimum default permissions for every job. Individual jobs
# can elevate to `write` only on the scope they need. Without this, any
# compromised third-party action runs with whatever the repo default grants
# (typically `contents: write`).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Raise the Node heap for every step in every job. The `@ever-works/plugin`
# tsup build emits `.d.ts` for ~18 entry points, which exhausts the default
# ~2 GB heap and fails the plugin-matrix + secret-store-matrix + lint-and-test
# jobs with ERR_WORKER_OUT_OF_MEMORY (the ESM/CJS outputs build fine; only the
# DTS worker OOMs). 6 GB clears it with headroom on the standard runner.
env:
  NODE_OPTIONS: --max-old-space-size=6144

jobs:
  # Relocated out of `lint-and-test` (body unchanged). It used to run BEFORE
  # `Check formatting` / `Build all packages` / `run test on all packages`, so a
  # dependency advisory failed the job and reported those three as `skipped`
  # rather than run. A red `lint-and-test` then meant "nothing was built or
  # tested" — indistinguishable at a glance from a real test failure, which is
  # how a broken spec sat unnoticed on develop for two months.
  #
  # As its own job the gate is exactly as strict (still a hard fail on
  # HIGH/CRITICAL) but it can no longer mask the build/test signal, and the two
  # surface as separate checks so the cause is obvious from the checks list.
  #
  # No `pnpm install` here on purpose: `pnpm audit` resolves from
  # `pnpm-lock.yaml` alone, so this job is checkout + pnpm + audit.
  dependency-audit:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x

      # H-15: fail the build if any production transitive dep has a HIGH or
      # CRITICAL vulnerability. The existing `pnpm.overrides` block proves
      # maintainers already patch high/critical drift; this just makes it
      # CI-enforced so a new transitive doesn't slip through unnoticed.
      # Moderate findings stay as Dependabot work (re-evaluate the threshold
      # if the backlog becomes too noisy).
      # NOTE (2026-07): npm retired the legacy audit endpoints
      # (`/-/npm/v1/security/audits` + `/quick`) — they now return HTTP 410,
      # so `pnpm audit` fails with `ERR_PNPM_AUDIT_BAD_RESPONSE` regardless of
      # whether any vulnerability exists. That is an endpoint outage, not a
      # security finding, and it was red-lining every PR in the repo. Degrade
      # gracefully: a genuine HIGH/CRITICAL finding still fails CI, but an
      # endpoint-unavailable error only warns. Self-healing — the gate re-arms
      # automatically once pnpm/npm expose a working (bulk) advisory endpoint.
      - name: Audit production dependencies (high+)
        shell: bash
        run: |
          set +e
          output="$(pnpm audit --prod --audit-level=high 2>&1)"
          code=$?
          printf '%s\n' "$output"
          if [ "$code" -eq 0 ]; then
            exit 0
          fi
          # Detect the endpoint outage by pnpm's OWN error CODE only — not by
          # human-language phrases like "410"/"retired", which could legitimately
          # appear inside a real CVE advisory description and wrongly soft-pass a
          # run that has actual vulnerabilities. `ERR_PNPM_AUDIT_BAD_RESPONSE` is
          # emitted only when the audit endpoint returns an unusable response; a
          # genuine high/critical finding never prints this token, so it still
          # hard-fails below. Any other non-endpoint error (e.g. a network blip)
          # also hard-fails — the conservative default.
          if printf '%s' "$output" | grep -qF 'ERR_PNPM_AUDIT_BAD_RESPONSE'; then
            echo "::warning title=Dependency audit skipped::npm's audit endpoint is unavailable (ERR_PNPM_AUDIT_BAD_RESPONSE — legacy audit API retired, HTTP 410). The high/critical audit gate is soft for this run and re-arms automatically once a working endpoint is restored."
            exit 0
          fi
          echo "::error title=Dependency audit failed::pnpm audit reported HIGH/CRITICAL production vulnerabilities (or an unexpected error). See the output above."
          exit "$code"

  lint-and-test:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Build all packages
        run: pnpm build --filter=!./apps/docs

      - name: run test on all packages
        run: pnpm test

      - name: Build Internal CLI
        working-directory: apps/internal-cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Build External CLI
        working-directory: apps/cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Test Internal CLI
        working-directory: apps/internal-cli
        # NODE_ENV=test signals this is a test-context bootstrap (the CLI uses
        # in-memory sqlite here, not a real database). C-07 PR-B made
        # `autoMigrate()` default-off everywhere except NODE_ENV=test â€” without
        # this env, `synchronize` doesn't run and the eager NestJS bootstrap
        # hits "no such table: subscription_plans". Equivalent to setting
        # DATABASE_AUTOMIGRATE=true explicitly; NODE_ENV=test is the standard
        # test-context signal already used by the unit-test suite.
        env:
          NODE_ENV: test
        run: pnpm test:cli

      - name: Test External CLI
        working-directory: apps/cli
        # See note above on the Internal CLI step â€” same C-07 PR-B implication.
        env:
          NODE_ENV: test
        run: pnpm test:cli

  # EW-742 P6 T37 â€” per-provider job-runtime plugin matrix.
  #
  # Why a separate job: the aggregate `pnpm test` step in `lint-and-test`
  # passes/fails as a single signal. When a contract change in
  # `@ever-works/plugin` ripples through the 4 plugin packages, the
  # aggregate run hides WHICH plugin broke. This job fans each plugin's
  # test suite into its own cell so the failure signal is per-provider.
  #
  # Scope: contract + bindToTenant + dispatcher/worker-host factories +
  # T31 enqueue-options translators + T36-T40 tenant conformance suite
  # â€” all mocks-only. The real-infra portion of T37 (a `TENANT_OVERLAY=
  # {off|on}` Ã— `JOB_RUNTIME={trigger|temporal|bullmq|pgboss|inngest}`
  # matrix against live Redis/Postgres/Temporal/Inngest service
  # containers) remains gated on CI infra availability â€” tracked in
  # tasks.md and ADR-017.
  #
  # Independent of `lint-and-test`: this job re-installs and re-builds
  # only the slice it needs, so a failing aggregate doesn't block this
  # signal (and vice versa).
  job-runtime-plugin-matrix:
    # Pool-relief (2026-07-18): these already passed on the PR; skip on main/stage
    # promotion pushes so k8s-build (the deploy build) is not starved on the shared
    # ARC pool. Still runs on PRs + develop pushes. Reversible: remove this if line.
    if: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')) }}
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        provider:
          - bullmq
          - pgboss
          - temporal
          - inngest
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @ever-works/plugin ships the contract surface + the
      # contracts-conformance subpath that each provider plugin imports
      # via `runJobRuntimeContractSuite` / `runJobRuntimeTenantContractSuite`
      # / `runSecretStoreContractSuite`. Build it first so the
      # downstream plugin's vitest can resolve the subpath.
      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter "@ever-works/plugin..." build

      - name: Test @ever-works/job-runtime-${{ matrix.provider }}-plugin
        run: pnpm --filter @ever-works/job-runtime-${{ matrix.provider }}-plugin test

  # EW-742 P6 T32/T37 real-infra axis â€” all 4 push-model providers
  # against live infra: BullMQ on Redis, pg-boss on Postgres, Temporal
  # via temporalio/auto-setup (shares the Postgres service, Temporal
  # namespaces its own tables), Inngest via the inngest/inngest dev
  # server. Real-infra cells run as a SEPARATE job from the mocks-only
  # matrix so an infra hiccup doesn't mask the mocks-only failure signal.
  # Cost gate: this job is restricted to direct pushes to main (see the
  # job-level `if:` below) because the four service containers burn
  # Ubicloud minutes; per-PR signal stays covered by the mocks-only
  # job-runtime-plugin-matrix above.
  job-runtime-real-infra:
    # Cost gate: real-infra cells spin up 4 service containers (Redis,
    # Postgres, Temporal auto-setup, Inngest dev-server) which burn
    # Ubicloud minutes. Run on direct pushes to main only â€” PR signal
    # stays covered by the mocks-only job-runtime-plugin-matrix above.
    # Re-enable per-PR by removing this `if:` line.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      temporal:
        # Pinned (was `:latest`). A moving `:latest` is why this job flipped red:
        # the tag advanced and the frontend now binds to the container's eth0 IP
        # instead of the loopback the healthcheck probes. 1.29.3 == what `:latest`
        # resolved to when this was fixed; bump deliberately, not by drift.
        image: temporalio/auto-setup:1.29.3
        env:
          DB: postgres12
          DB_PORT: '5432'
          POSTGRES_USER: test
          POSTGRES_PWD: test
          POSTGRES_SEEDS: postgres
          # THE fix: bind the frontend on all interfaces so the loopback
          # healthcheck below can reach it. Without this, temporal binds only the
          # container IP (e.g. 172.18.0.x:7233) and `nc -z localhost 7233` fails
          # for the whole window -> the container is marked unhealthy and
          # "Initialize containers" fails even though the server is up. Verified
          # on a k8s repro: with BIND_ON_IP=0.0.0.0 the loopback probe passes ~80s
          # in; without it, never.
          BIND_ON_IP: '0.0.0.0'
        ports: ['7233:7233']
        # Schema setup + boot measured ~80s on a ready DB; give it comfortable
        # headroom (start-period 45s + 18x10s = 225s) so a slow warm-up or a
        # postgres-not-yet-queryable retry can't tip it over.
        options: --health-cmd "nc -z localhost 7233" --health-interval 10s --health-timeout 5s --health-retries 18 --health-start-period 45s
      # NOTE: inngest is intentionally NOT a service container. The
      # `inngest/inngest` image's default entrypoint is the CLI (it just prints
      # help and exits) — the dev server only starts under the `dev` subcommand,
      # and GitHub `services:` cannot override a container's command. So the
      # container never listened on 8288 and the job failed at "Initialize
      # containers". Started as a `docker run` step below instead (which CAN pass
      # `dev`), reachable at localhost:8288 the same way the service containers are.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter "@ever-works/plugin..." build

      - name: BullMQ real-infra
        env:
          EW_TEST_REAL_REDIS_URL: redis://localhost:6379
        run: pnpm --filter @ever-works/job-runtime-bullmq-plugin test

      - name: pg-boss real-infra
        env:
          EW_TEST_REAL_PGBOSS_URL: postgres://test:test@localhost:5432/test
        run: pnpm --filter @ever-works/job-runtime-pgboss-plugin test

      # The temporal-plugin real-infra suite tags workflows with a custom
      # `tenantId` search attribute (multi-tenant routing). Temporal v10 rejects
      # `StartWorkflow` with an unregistered search attribute
      # ("Namespace default has no mapping defined for search attribute tenantId"),
      # and auto-setup does not create custom attributes. Register it up front,
      # inside the temporal service container (localhost:7233 = its own frontend)
      # via the `temporal` CLI the image already ships. Idempotent enough for CI —
      # `|| true` so a re-run where it already exists doesn't fail the job.
      - name: Register Temporal search attributes
        run: |
          cid="$(docker ps -qf 'ancestor=temporalio/auto-setup:1.29.3' | head -n1)"
          if [ -z "$cid" ]; then echo "::error::temporal container not found"; exit 1; fi
          docker exec "$cid" temporal operator search-attribute create \
            --namespace default --name tenantId --type Keyword || true
          echo "Registered search attributes:"
          docker exec "$cid" temporal operator search-attribute list --namespace default || true
          # Registration propagates to the matching/history services asynchronously;
          # give it a moment so the first StartWorkflow in the test sees it.
          sleep 5

      - name: Temporal real-infra
        env:
          EW_TEST_REAL_TEMPORAL_ADDRESS: localhost:7233
        run: pnpm --filter @ever-works/job-runtime-temporal-plugin test

      # Start the Inngest dev server via `docker run` (not a service container —
      # see the note in `services:` above). `dev` is the subcommand that actually
      # serves; `--host 0.0.0.0` binds all interfaces so the loopback probe and
      # the test's http://localhost:8288 both reach it; `--no-discovery` skips the
      # auto-scan for a local app (there is none here). Same pinned image tag.
      - name: Start Inngest dev server
        run: |
          docker run -d --name inngest -p 8288:8288 \
            inngest/inngest:v1.38.1 dev --no-discovery --host 0.0.0.0
          echo "Waiting for Inngest on http://localhost:8288 ..."
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null http://localhost:8288/; then
              echo "Inngest is ready."; exit 0
            fi
            sleep 2
          done
          echo "::error::Inngest dev server did not become ready in time"
          docker logs inngest || true
          exit 1

      - name: Inngest real-infra
        env:
          EW_TEST_REAL_INNGEST_URL: http://localhost:8288
        run: pnpm --filter @ever-works/job-runtime-inngest-plugin test

  # Companion matrix for the secret-store-resolver provider family
  # (EW-742 P3.2 / P6 â€” runSecretStoreContractSuite is wired into all 7
  # plugins via `<plugin>-conformance.spec.ts`). Same rationale as the
  # job-runtime matrix above: per-provider failure signal.
  secret-store-plugin-matrix:
    # Pool-relief (2026-07-18): these already passed on the PR; skip on main/stage
    # promotion pushes so k8s-build (the deploy build) is not starved on the shared
    # ARC pool. Still runs on PRs + develop pushes. Reversible: remove this if line.
    if: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')) }}
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        provider:
          - vault
          - k8s
          - infisical
          - doppler
          - aws-sm
          - gcp-sm
          - azure-kv
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v3
        with:
          version: 10.33.3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ever-works/plugin (contract + conformance subpath)
        run: pnpm --filter "@ever-works/plugin..." build

      - name: Test @ever-works/secret-store-${{ matrix.provider }}-plugin
        run: pnpm --filter @ever-works/secret-store-${{ matrix.provider }}-plugin test

