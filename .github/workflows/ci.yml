name: CI

on:
  push:
    branches: [main, develop, stage]
  pull_request:
    branches: [main, develop, stage]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubicloud-standard-8

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.13.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify migrations are in sync with entities
        working-directory: apps/api
        run: |
          # Use SQLite for CI migration verification
          export DATABASE_TYPE=better-sqlite3
          export DATABASE_PATH=./ci-test.db

          # Step 1: Run existing migrations to bring DB schema up to date
          echo "==> Running existing migrations..."
          pnpm migration:run

          # Step 2: Try to generate a new migration
          echo "==> Checking for uncommitted entity changes..."
          GENERATE_OUTPUT=$(pnpm migration:generate src/migrations/VerifySync 2>&1) || true
          echo "$GENERATE_OUTPUT"

          # Step 3: Check if a migration file was generated
          if echo "$GENERATE_OUTPUT" | grep -q "has been generated successfully"; then
            echo ""
            echo "::error::Entity changes detected without corresponding migration!"
            echo "::error::Please run 'cd apps/api && pnpm migration:generate src/migrations/YourMigrationName'"
            echo ""
            # Show what changed
            git diff --name-only
            exit 1
          fi

          # No migration generated means entities are in sync
          echo "==> Migrations are in sync with entities"

          # Cleanup
          rm -f ./ci-test.db

      - name: Build Internal CLI
        working-directory: apps/internal-cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Build External CLI
        working-directory: apps/cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Test Internal CLI
        working-directory: apps/internal-cli
        run: pnpm test:cli

      - name: Test External CLI
        working-directory: apps/cli
        run: pnpm test:cli
