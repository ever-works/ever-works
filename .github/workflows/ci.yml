name: CI

on:
  push:
    branches: [main, develop, stage]
  pull_request:
    branches: [main, develop, stage]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubicloud-standard-8

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.13.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify migrations are in sync with entities
        working-directory: apps/api
        run: |
          # Generate migration to check if entities are in sync
          pnpm migration:generate src/migrations/VerifySync 2>&1 || true

          # Check if any new migration file was created
          if git diff --name-only | grep -q "src/migrations/"; then
            echo "::error::Entity changes detected without corresponding migration!"
            echo "Please run 'pnpm migration:generate src/migrations/YourMigrationName' in apps/api"
            git diff --name-only
            exit 1
          fi

          # Clean up any generated verification file
          git checkout -- . 2>/dev/null || true
          echo "Migrations are in sync with entities"

      - name: Build Internal CLI
        working-directory: apps/internal-cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Build External CLI
        working-directory: apps/cli
        run: pnpm build:cli
        env:
          API_URL: ${{ secrets.API_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}

      - name: Test Internal CLI
        working-directory: apps/internal-cli
        run: pnpm test:cli

      - name: Test External CLI
        working-directory: apps/cli
        run: pnpm test:cli
