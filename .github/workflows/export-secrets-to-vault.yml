name: export-secrets-to-vault
on:
  workflow_dispatch:
    inputs:
      pass:
        description: 'One-time encryption passphrase'
        required: true
permissions:
  contents: read
jobs:
  export:
    runs-on: ${{ vars.RUNNER_LINUX_X64_8 || 'ubuntu-latest' }}
    steps:
      - name: Encrypt all repo secrets (values never printed)
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          PASS: ${{ inputs.pass }}
        run: |
          printf '%s' "$ALL_SECRETS" | openssl enc -aes-256-cbc -pbkdf2 -salt -pass env:PASS -base64 -A > secrets.enc
          echo "encrypted bytes:"; wc -c < secrets.enc
      - name: Upload encrypted bundle
        uses: actions/upload-artifact@v4
        with:
          name: secrets-enc
          path: secrets.enc
          retention-days: 1
