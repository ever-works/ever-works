name: export-secrets-to-vault
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  export:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 }}
    steps:
      - name: Write all repo secrets to OpenBao (values never printed)
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          BAO_ADDR: ${{ secrets.OPENBAO_ADDR }}
          BAO_TOKEN: ${{ secrets.OPENBAO_TOKEN }}
        run: |
          printf '{"data":%s}' "$ALL_SECRETS" > /tmp/payload.json
          code=$(curl -s -o /tmp/resp.json -w '%{http_code}' -H "X-Vault-Token: $BAO_TOKEN" -X POST --data @/tmp/payload.json "$BAO_ADDR/v1/kv/data/github/ever-works/all")
          echo "openbao write http=$code"
          if [ "$code" != "200" ]; then cat /tmp/resp.json; exit 1; fi
          echo "OK: wrote secrets to kv/github/ever-works/all"
